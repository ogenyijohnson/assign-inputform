<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <style></style>
  </head>

  <body>
    <form>
      <!--------------- heading ------------>
      <h1>Login Form</h1>

      <!-- main form wrapper -->

      <!-- mobile/email input --------------------------->

      <div class="field">
        <div class="input-box">
          <i class="fa-solid fa-user"></i>
          <input type="text" placeholder="Mobile number or email" />
        </div>

        <div class="input-box">
          <i class="fa fa-lock"></i>

          <input type="password" placeholder="Password" />
        </div>

        <p><a href="#">Forgotten password?</a></p>

        <button class="btn-1 btn" type="submit"><a href="#">Log In</a></button>
      </div>

      <!-- other login options ---------------------->

      <div>
        <p>or login with</p>
      </div>

      <div class="social">
        <button class="btn-2 btn" type="submit">
          <i class="fab fa-facebook-f"></i>
          <a href="https://www.facebook.com/login>" target="_blank">Facebook</a>
        </button>

        <button class="btn-3 btn" type="submit">
          <i class="fab fa-instagram"></i>
          <a href="https://www.instagram.com/login" target="_blank">
            Instagram</a
          >
        </button>
      </div>

      <!-- Sign Up Option -->

      <p>
        Don't have an account?
        <a href="signup.html" class="singn-link" target="_blank">
          Signup Now
        </a>
      </p>
    </form>
  </body>
</html>
